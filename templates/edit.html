<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Student</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f5f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
}

.container h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:16px;
    transition:.3s;
}

input:focus{
    border-color:#007BFF;
    box-shadow:0 0 5px rgba(0,123,255,.3);
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}

</style>

</head>
<body>

<div class="container">

<form method="POST">

{% csrf_token %}

<h1>Edit Student</h1>

<input type="text" name="name" value="{{ student.name }}" placeholder="Name">

<input type="text" name="rollno" value="{{ student.rollno }}" placeholder="Roll No">

<input type="text" name="student_branch" value="{{ student.student_branch }}" placeholder="Branch">

<input type="text" name="section" value="{{ student.section }}" placeholder="Section">

<input type="text" name="place" value="{{ student.place }}" placeholder="Place">

<button type="submit">Save Changes</button>

</form>

</div>

</body>
</html>
