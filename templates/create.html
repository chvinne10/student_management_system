<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Student</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f5f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
}

.container h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:16px;
    transition:.3s;
}

input:focus{
    border-color:#28a745;
    box-shadow:0 0 5px rgba(40,167,69,.3);
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#28a745;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#218838;
}

</style>

</head>
<body>

<div class="container">

<form method="POST">

{% csrf_token %}

<h1>Create New Student</h1>

<input type="text" name="name" placeholder="Enter Name">

<input type="text" name="rollno" placeholder="Enter Roll Number">

<input type="text" name="student_branch" placeholder="Enter Branch">

<input type="text" name="section" placeholder="Enter Section">

<input type="text" name="place" placeholder="Enter Place">

<button type="submit">Create Student</button>

</form>

</div>

</body>
</html>
