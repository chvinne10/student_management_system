<!DOCTYPE html>
<html>
<head>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;

}

body{

background:#f5f5f5;
padding:30px;

}

h1{

text-align:center;
margin-bottom:20px;

}

.top{

display:flex;
justify-content:space-between;
margin-bottom:20px;

}

button{

padding:10px 18px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;

}

.create{

background:#28a745;

}

.logout{

background:#c82333;

}

.edit{

background:#007BFF;

}

.delete{

background:#dc3545;

}

table{

width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 0 10px rgba(0,0,0,.15);

}

th{

background:#343a40;
color:white;

padding:15px;

}

td{

padding:12px;
text-align:center;

}

tr:nth-child(even){

background:#f8f8f8;

}

button:hover{

opacity:.9;

}

</style>

</head>

<body>

<h1>Student Management System</h1>

<div class="top">

<a href="{% url 'create' %}">

<button class="create">+ Create Student</button>

</a>

<a href="{% url 'logged_out' %}">

<button class="logout">Logout</button>

</a>

</div>

<table>

<tr>

<th>Name</th>

<th>Roll No</th>

<th>Branch</th>

<th>Section</th>

<th>Place</th>

<th>Edit</th>

<th>Delete</th>

</tr>

{% for i in student %}

<tr>

<td>{{i.name}}</td>

<td>{{i.rollno}}</td>

<td>{{i.student_branch}}</td>

<td>{{i.section}}</td>

<td>{{i.place}}</td>

<td>

<a href="{% url 'edit' i.rollno %}">

<button class="edit">Edit</button>

</a>

</td>

<td>

<a href="{% url 'delete' i.rollno %}">

<button class="delete">Delete</button>

</a>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
